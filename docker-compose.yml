# Production Docker Compose - connects to external database
# Usage: docker compose --env-file .env.prod up --build

services:
  backend:
    build: ./src/backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
    restart: unless-stopped

  frontend:
    build: ./src/frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
